<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>현대청운고 급식</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
    font-family: 'Pretendard', sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    background: #eef2f7;
}

.container {
    background: white;
    padding: 2rem;
    border-radius: 20px;
    width: 380px;
    text-align: center;
    box-shadow: 0 4px 20px rgba(0,0,0,0.08);
}

h2 {
    font-size: 1.3rem;
    margin-bottom: 0.4rem;
    color: #222;
}

#dateDisplay {
    color: #888;
    font-size: 0.9rem;
    margin-bottom: 1.2rem;
}

.tab-group {
    display: flex;
    justify-content: center;
    gap: 8px;
    margin-bottom: 1.2rem;
}

.tab-group button {
    padding: 8px 20px;
    border-radius: 20px;
    border: 2px solid #e0e0e0;
    background: white;
    color: #555;
    font-size: 0.9rem;
    cursor: pointer;
    transition: all 0.2s;
    font-family: inherit;
}

.tab-group button.active {
    background: #3a7bd5;
    border-color: #3a7bd5;
    color: white;
    font-weight: bold;
}

#mealContent {
    min-height: 180px;
    padding: 1rem;
    background: #f8f9fb;
    border-radius: 12px;
    font-size: 0.95rem;
    line-height: 2;
    color: #333;
    text-align: left;
}

#mealContent.empty {
    display: flex;
    align-items: center;
    justify-content: center;
    color: #aaa;
    font-size: 0.9rem;
}

#status {
    margin-top: 0.8rem;
    font-size: 0.78rem;
    color: #bbb;
}
</style>
</head>
<body>

<div class="container">
    <h2>🍴 현대청운고 급식</h2>
    <div id="dateDisplay"></div>

    <div class="tab-group">
        <button onclick="showMeal(0)">조식</button>
        <button class="active" onclick="showMeal(1)">중식</button>
        <button onclick="showMeal(2)">석식</button>
    </div>

    <div id="mealContent" class="empty">불러오는 중...</div>
    <div id="status">연결 중...</div>
</div>

<script>
const API_KEY = "4b59e607f9a141b388fbf861a04158f3";
const ATPT_OFCDC_SC_CODE = "B10";
const SD_SCHUL_CODE = "7480037";

// MEAL_TYPE: 1=조식, 2=중식, 3=석식
const MEAL_TYPE_CODES = [1, 2, 3];
let meals = [null, null, null];
let currentIndex = 1;

function getYMD() {
    const now = new Date();
    const year = now.getFullYear();
    const month = String(now.getMonth() + 1).padStart(2, "0");
    const day = String(now.getDate()).padStart(2, "0");
    return `${year}${month}${day}`;
}

function updateDate() {
    const now = new Date();
    const dayNames = ['일','월','화','수','목','금','토'];
    document.getElementById("dateDisplay").innerText =
        `${now.getFullYear()}년 ${now.getMonth()+1}월 ${now.getDate()}일 (${dayNames[now.getDay()]})`;
}

function parseDish(raw) {
    if (!raw) return null;
    return raw
        .replace(/<br\/>/gi, "\n")          // 줄바꿈 태그 처리
        .replace(/\([0-9.×*]+\)/g, "")      // 알레르기 번호 제거: (1.2.13) 등
        .replace(/[*×]/g, "")               // 남은 특수문자 제거
        .split("\n")
        .map(line => line.trim())
        .filter(line => line.length > 0)
        .join("\n");
}

async function fetchMeal() {
    const ymd = getYMD();
    // 하루치 전체를 한 번에 가져옴 (MLSV_YMD로 당일 전체 조회)
    const url = `https://open.neis.go.kr/hub/mealServiceDietInfo` +
        `?KEY=${API_KEY}&Type=json` +
        `&ATPT_OFCDC_SC_CODE=${ATPT_OFCDC_SC_CODE}` +
        `&SD_SCHUL_CODE=${SD_SCHUL_CODE}` +
        `&MLSV_YMD=${ymd}`;

    try {
        const res = await fetch(url);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();

        // NEIS API 에러 응답 처리
        if (data.RESULT) {
            setStatus(`급식 정보 없음 (${data.RESULT.MESSAGE})`);
            showMeal(1);
            return;
        }

        if (!data.mealServiceDietInfo) {
            setStatus("오늘 급식 정보가 없습니다.");
            showMeal(1);
            return;
        }

        const rows = data.mealServiceDietInfo[1].row;

        // 조식(1), 중식(2), 석식(3) 각각 파싱
        for (const row of rows) {
            const typeCode = parseInt(row.MMEAL_SC_CODE); // 1,2,3
            const idx = typeCode - 1;                     // 0,1,2
            if (idx >= 0 && idx <= 2) {
                meals[idx] = parseDish(row.DDISH_NM);
            }
        }

        setStatus("불러오기 완료 ✓");
        showMeal(1);

    } catch (e) {
        // CORS 오류일 가능성이 높으면 안내 메시지 표시
        console.error(e);
        if (e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
            setStatus("⚠️ CORS 오류 — 아래 안내를 확인하세요");
            document.getElementById("mealContent").innerHTML =
                `<span style="color:#e55;font-size:0.85rem;line-height:1.8">
                CORS 정책으로 인해 로컬 파일에서<br>
                직접 API 호출이 차단되었습니다.<br><br>
                <b>해결 방법:</b><br>
                1. VS Code + Live Server 확장으로 열기<br>
                2. 또는 터미널에서:<br>
                <code>npx serve .</code> 후 localhost로 접속
                </span>`;
        } else {
            setStatus(`오류: ${e.message}`);
        }
    }
}

function showMeal(index) {
    currentIndex = index;
    const content = document.getElementById("mealContent");
    const meal = meals[index];

    if (meal) {
        content.classList.remove("empty");
        content.innerText = meal;
    } else {
        content.classList.add("empty");
        content.innerText = index === 0 ? "조식 정보 없음" :
                            index === 1 ? "중식 정보 없음" : "석식 정보 없음";
    }

    document.querySelectorAll(".tab-group button").forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
    });
}

function setStatus(msg) {
    document.getElementById("status").innerText = msg;
}

updateDate();
fetchMeal();
</script>

</body>
</html>
